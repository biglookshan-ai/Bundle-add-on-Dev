# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "13c93a201a53e069d25c5b8766140191"
name = "Bundle App Dev"
handle = "cinegearpro-addons"
embedded = true
application_url = "https://shopify.dev/apps/default-app-home"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read/write_products: read + write the addon_config product metafield.
# write_discounts: create the automatic discount that activates the Function.
scopes = "read_products,write_products,write_discounts"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
